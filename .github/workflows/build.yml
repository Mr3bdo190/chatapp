name: Build Flutter APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Generate Android Files
        run: flutter create . --platforms android

      - name: Force SDK 34 Globally for All Plugins
        run: |
          # 1. إنشاء ملف يجبر كل المشاريع الفرعية على استخدام SDK 34
          echo "subprojects {" > android/force-sdk.gradle
          echo "    afterEvaluate { project ->" >> android/force-sdk.gradle
          echo "        if (project.hasProperty('android')) {" >> android/force-sdk.gradle
          echo "            project.android {" >> android/force-sdk.gradle
          echo "                compileSdkVersion 34" >> android/force-sdk.gradle
          echo "                targetSdkVersion 34" >> android/force-sdk.gradle
          echo "            }" >> android/force-sdk.gradle
          echo "        }" >> android/force-sdk.gradle
          echo "    }" >> android/force-sdk.gradle
          echo "}" >> android/force-sdk.gradle
          
          # 2. حقن هذا الملف في الجذر (سواء كان بصيغة kts الجديدة أو gradle القديمة)
          if [ -f android/build.gradle.kts ]; then
            echo "apply(from = \"force-sdk.gradle\")" >> android/build.gradle.kts
          elif [ -f android/build.gradle ]; then
            echo "apply from: 'force-sdk.gradle'" >> android/build.gradle
          fi

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
