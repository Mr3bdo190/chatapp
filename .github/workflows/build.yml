name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Generate Platform Files
      run: |
        flutter create --org com.abdullah --project-name affiliate_store .
        sed -i 's/android:label="[^"]*"/android:label="متجري"/g' android/app/src/main/AndroidManifest.xml

    - name: Install Dependencies
      run: flutter pub get

    - name: Build APK
      run: flutter build apk --release

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Mr_Shop_APK
        path: build/app/outputs/flutter-apk/app-release.apk
