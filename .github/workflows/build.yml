name: Build Flutter APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install & Upgrade Dependencies
        run: |
          flutter pub get
          flutter pub upgrade

      - name: Generate Android Files
        run: flutter create . --platforms android

      - name: Fix App SDK Version
        run: |
          find android -type f \( -name "build.gradle" -o -name "build.gradle.kts" \) -exec sed -i 's/compileSdk = .*/compileSdk = 34/g' {} + || true
          find android -type f \( -name "build.gradle" -o -name "build.gradle.kts" \) -exec sed -i 's/compileSdkVersion = .*/compileSdkVersion = 34/g' {} + || true
          find android -type f \( -name "build.gradle" -o -name "build.gradle.kts" \) -exec sed -i 's/compileSdkVersion .*/compileSdkVersion 34/g' {} + || true

      - name: Ultimate Hack - Patch Firebase Plugins in Pub Cache
        run: |
          # العثور على مسار الكاش الخاص بحزم فلاتر وتعديل الكود المصدري للحزم من جذوره
          PUB_DIR=$(dirname $(which flutter))/../.pub-cache
          find ~/.pub-cache "$PUB_DIR" -type f -name "build.gradle" 2>/dev/null | xargs sed -i 's/compileSdkVersion 33/compileSdkVersion 34/g' || true
          find ~/.pub-cache "$PUB_DIR" -type f -name "build.gradle" 2>/dev/null | xargs sed -i 's/compileSdk 33/compileSdk 34/g' || true
          find ~/.pub-cache "$PUB_DIR" -type f -name "build.gradle" 2>/dev/null | xargs sed -i 's/compileSdkVersion 32/compileSdkVersion 34/g' || true
          find ~/.pub-cache "$PUB_DIR" -type f -name "build.gradle" 2>/dev/null | xargs sed -i 's/compileSdk 32/compileSdk 34/g' || true

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
